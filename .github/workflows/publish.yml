name: 'publish'

on:
  push:
    tags:
      - '*'

jobs:
  cargo-fmt:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-fmt

  cargo-clippy:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-clippy

  pnpm-check:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: pnpm-check

  publish-tauri-macos:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'macos-latest'
      args: '--target aarch64-apple-darwin'
      rust-targets: 'aarch64-apple-darwin'
      artifact-name: 'singularity-macos-aarch64'
      artifact-path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**'
    secrets: inherit

  publish-tauri-linux:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'ubuntu-22.04'
      args: ''
      rust-targets: ''
      artifact-name: 'singularity-linux-x64'
      artifact-path: |
        src-tauri/target/release/bundle/**/*.deb
        src-tauri/target/release/bundle/**/*.AppImage
        src-tauri/target/release/bundle/**/*.rpm
    secrets: inherit

  publish-tauri-windows:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'windows-latest'
      args: ''
      rust-targets: ''
      artifact-name: 'singularity-windows-x64'
      artifact-path: 'src-tauri/target/release/bundle/**'
    secrets: inherit

  publish-flatpak:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-flatpak-job.yml
    with:
      manifest-path: 'flatpak/eu.luxuride.singularity.yml'
      bundle-name: 'singularity-linux-flatpak.flatpak'
      artifact-name: 'singularity-linux-flatpak'
    secrets: inherit

  publish:
    needs:
      - publish-tauri-macos
      - publish-tauri-linux
      - publish-tauri-windows
      - publish-flatpak
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'singularity-*'
          merge-multiple: true
          path: 'release-assets'

      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ format('Singularity {0}', github.ref_name) }}
          body: ${{ format('Release for {0}', github.ref_name) }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**
