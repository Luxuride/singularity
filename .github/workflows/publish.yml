name: 'publish'

on:
  push:
    tags:
      - '*'

jobs:
  cargo-fmt:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-fmt

  cargo-clippy:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-clippy

  npm-check:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: npm-check

  publish-tauri-macos:
    needs:
      - cargo-fmt
      - cargo-clippy
      - npm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'macos-latest'
      args: '--target aarch64-apple-darwin'
      rust-targets: 'aarch64-apple-darwin'
      artifact-name: 'singularity-macos-aarch64'
      artifact-path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**'
    secrets: inherit

  publish-tauri-linux:
    needs:
      - cargo-fmt
      - cargo-clippy
      - npm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'ubuntu-22.04'
      args: '--bundles deb,rpm,appimage'
      rust-targets: ''
      artifact-name: 'singularity-linux-x64'
      artifact-path: |
        src-tauri/target/release/bundle/**/*.deb
        src-tauri/target/release/bundle/**/*.AppImage
        src-tauri/target/release/bundle/**/*.rpm
    secrets: inherit

  publish-tauri-windows:
    needs:
      - cargo-fmt
      - cargo-clippy
      - npm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'windows-latest'
      args: ''
      rust-targets: ''
      artifact-name: 'singularity-windows-x64'
      artifact-path: 'src-tauri/target/release/bundle/**'
    secrets: inherit

  publish-flatpak:
    needs:
      - cargo-fmt
      - cargo-clippy
      - npm-check
    uses: ./.github/workflows/build-flatpak-job.yml
    with:
      manifest-path: 'flatpak/eu.luxuride.singularity.yml'
      bundle-name: 'singularity-linux-flatpak.flatpak'
      artifact-name: 'singularity-linux-flatpak'
    secrets: inherit

  publish-release:
    needs:
      - publish-tauri-macos
      - publish-tauri-linux
      - publish-tauri-windows
      - publish-flatpak
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: download macos artifact
        uses: actions/download-artifact@v8
        with:
          name: 'singularity-macos-aarch64'
          path: 'release-assets/macos-aarch64'

      - name: download linux artifact
        uses: actions/download-artifact@v8
        with:
          name: 'singularity-linux-x64'
          path: 'release-assets/linux-x64'

      - name: download windows artifact
        uses: actions/download-artifact@v8
        with:
          name: 'singularity-windows-x64'
          path: 'release-assets/windows-x64'

      - name: download flatpak artifact
        uses: actions/download-artifact@v8
        with:
          name: 'singularity-linux-flatpak'
          path: 'release-assets/linux-flatpak'

      - name: package release assets by package type
        run: bash scripts/package-release-assets.sh "${{ github.ref_name }}"

      - name: publish github release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ format('Singularity {0}', github.ref_name) }}
          body: ${{ format('Release for {0}', github.ref_name) }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-packages/*
          overwrite_files: true
