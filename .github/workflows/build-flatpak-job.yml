name: 'build-flatpak-job'

on:
  workflow_call:
    inputs:
      manifest-path:
        required: false
        type: string
        default: 'flatpak/eu.luxuride.singularity.yml'
      bundle-name:
        required: false
        type: string
        default: 'singularity-linux-flatpak.flatpak'
      artifact-name:
        required: false
        type: string
        default: 'singularity-linux-flatpak'

jobs:
  build-flatpak:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: check flatpak manifest
        id: manifest
        run: |
          if test -f "${{ inputs.manifest-path }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Flatpak manifest not found at ${{ inputs.manifest-path }}. Skipping Flatpak build."
          fi

      - name: setup node
        if: steps.manifest.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: rust cache
        if: steps.manifest.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: install Rust stable
        if: steps.manifest.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: install pnpm
        if: steps.manifest.outputs.exists == 'true'
        run: npm install -g pnpm

      - name: install frontend dependencies
        if: steps.manifest.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: vendor cargo dependencies
        if: steps.manifest.outputs.exists == 'true'
        run: |
          mkdir -p .cargo
          cargo vendor --manifest-path src-tauri/Cargo.toml --locked vendor > .cargo/config.toml

      - name: build flatpak bundle
        if: steps.manifest.outputs.exists == 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ inputs.bundle-name }}
          manifest-path: ${{ inputs.manifest-path }}
          cache-key: flatpak-builder-${{ github.sha }}

      - name: upload flatpak artifact
        if: steps.manifest.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.bundle-name }}
          if-no-files-found: error