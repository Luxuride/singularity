name: 'build-flatpak-job'

on:
  workflow_call:
    inputs:
      manifest-path:
        required: false
        type: string
        default: 'flatpak/eu.luxuride.singularity.yml'
      bundle-name:
        required: false
        type: string
        default: 'singularity-linux-flatpak.flatpak'
      artifact-name:
        required: false
        type: string
        default: 'singularity-linux-flatpak'

jobs:
  build-flatpak:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: check flatpak manifest
        id: manifest
        run: |
          if test -f "${{ inputs.manifest-path }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Flatpak manifest not found at ${{ inputs.manifest-path }}. Skipping Flatpak build."
          fi

      - name: setup node
        if: steps.manifest.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        if: steps.manifest.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: install pnpm
        if: steps.manifest.outputs.exists == 'true'
        run: npm install -g pnpm

      - name: install frontend dependencies
        if: steps.manifest.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: vendor cargo dependencies
        if: steps.manifest.outputs.exists == 'true'
        run: |
          mkdir -p .cargo
          cargo vendor --manifest-path src-tauri/Cargo.toml --locked vendor > .cargo/config.toml

      - name: patch matrix-sdk via local source override
        if: steps.manifest.outputs.exists == 'true'
        run: |
          set -euo pipefail
          mkdir -p vendor-patches
          rm -rf vendor-patches/matrix-sdk
          cp -a vendor/matrix-sdk vendor-patches/matrix-sdk
          MATRIX_SDK_LIB="vendor-patches/matrix-sdk/src/lib.rs"
          if test -f "$MATRIX_SDK_LIB"; then
            if ! grep -q '^#!\[recursion_limit = "256"\]' "$MATRIX_SDK_LIB"; then
              sed -i '1i #![recursion_limit = "256"]' "$MATRIX_SDK_LIB"
            fi
          else
            echo "Expected vendored matrix-sdk at $MATRIX_SDK_LIB but it was not found."
            exit 1
          fi

          printf '\n[patch.crates-io]\n' >> .cargo/config.toml
          printf 'matrix-sdk = { path = "vendor-patches/matrix-sdk" }\n' >> .cargo/config.toml

          cargo update -p matrix-sdk --manifest-path src-tauri/Cargo.toml --offline

      - name: build flatpak bundle
        if: steps.manifest.outputs.exists == 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ inputs.bundle-name }}
          manifest-path: ${{ inputs.manifest-path }}
          cache: true
          cache-key: flatpak-builder-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: upload flatpak artifact
        if: steps.manifest.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.bundle-name }}
          if-no-files-found: error