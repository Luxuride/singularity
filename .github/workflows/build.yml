name: 'build'

on:
  push:
    branches:
      - master

jobs:
  cargo-fmt:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-fmt

  cargo-clippy:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: cargo-clippy

  pnpm-check:
    uses: ./.github/workflows/quality-checks.yml
    with:
      check: pnpm-check

  build-tauri-macos:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'macos-latest'
      args: '--target aarch64-apple-darwin'
      rust-targets: 'aarch64-apple-darwin'
      artifact-name: 'singularity-macos-aarch64'
      artifact-path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/**'
    secrets: inherit

  build-tauri-linux:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'ubuntu-22.04'
      args: ''
      rust-targets: ''
      artifact-name: 'singularity-linux-x64'
      artifact-path: |
        src-tauri/target/release/bundle/**/*.deb
        src-tauri/target/release/bundle/**/*.AppImage
        src-tauri/target/release/bundle/**/*.rpm
    secrets: inherit

  build-tauri-windows:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-tauri-job.yml
    with:
      platform: 'windows-latest'
      args: ''
      rust-targets: ''
      artifact-name: 'singularity-windows-x64'
      artifact-path: 'src-tauri/target/release/bundle/**'
    secrets: inherit

  build-flatpak:
    needs:
      - cargo-fmt
      - cargo-clippy
      - pnpm-check
    uses: ./.github/workflows/build-flatpak-job.yml
    with:
      manifest-path: 'flatpak/eu.luxuride.singularity.yml'
      bundle-name: 'singularity-linux-flatpak.flatpak'
      artifact-name: 'singularity-linux-flatpak'
    secrets: inherit

  package-artifacts:
    needs:
      - build-tauri-macos
      - build-tauri-linux
      - build-tauri-windows
      - build-flatpak
    runs-on: ubuntu-22.04
    steps:
      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: 'singularity-*'
          merge-multiple: true
          path: 'build-assets'

      - name: package build bundle
        run: tar -czf singularity-build-assets.tar.gz -C build-assets .

      - name: upload build bundle
        uses: actions/upload-artifact@v7
        with:
          name: 'singularity-build-assets'
          path: 'singularity-build-assets.tar.gz'
          if-no-files-found: error
