app-id: eu.luxuride.singularity
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: singularity

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/singularity/cargo
    CARGO_TARGET_DIR: /run/build/singularity/target
    XDG_CACHE_HOME: /run/build/singularity/.cache

finish-args:
  - --share=network
  - --share=ipc
  - --socket=session-bus
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --env=GTK_USE_PORTAL=1
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Settings
  - --talk-name=ca.desrt.dconf
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man

modules:
  - name: singularity
    buildsystem: simple
    build-commands:
      - npm run tauri -- build --no-bundle --config flatpak/tauri.flatpak.conf.json -- --locked --offline
      - install -Dm755 target/release/singularity /app/bin/singularity
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/eu.luxuride.singularity.png
      - install -Dm644 flatpak/eu.luxuride.singularity.desktop /app/share/applications/eu.luxuride.singularity.desktop
      - install -Dm644 flatpak/eu.luxuride.singularity.metainfo.xml /app/share/metainfo/eu.luxuride.singularity.metainfo.xml
    sources:
      - type: dir
        path: ..
